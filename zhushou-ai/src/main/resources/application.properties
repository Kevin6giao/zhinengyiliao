#web服务的端口号
server.port=8080

langchain4j.open-ai.chat-model.base-url=https://openrouter.ai/api/v1
langchain4j.open-ai.chat-model.api-key=${OPENROUTER_API_KEY}
langchain4j.open-ai.chat-model.model-name=stepfun/step-3.5-flash:free

#流式聊天模型配置
langchain4j.open-ai.streaming-chat-model.base-url=https://openrouter.ai/api/v1
langchain4j.open-ai.streaming-chat-model.api-key=${OPENROUTER_API_KEY}
langchain4j.open-ai.streaming-chat-model.model-name=stepfun/step-3.5-flash:free
langchain4j.open-ai.streaming-chat-model.bean-name=qwenStreamingChatModel

#应用程序发送给大模型的请求日志和响应日志
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

#集成OpenRouter-通用文本向量
langchain4j.open-ai.embedding-model.base-url=https://openrouter.ai/api/v1
langchain4j.open-ai.embedding-model.api-key=${OPENROUTER_API_KEY}
langchain4j.open-ai.embedding-model.model-name=intfloat/multilingual-e5-large

#MongoDB连接配置
spring.data.mongodb.uri=mongodb://localhost:27017/chat_memory_db

# 基本数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/zhihuizhushou?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 开启 SQL 日志打印
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

#将系统日志设置为debug级别
logging.level.root=info